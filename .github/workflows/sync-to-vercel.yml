name: Sync PDFs to Website

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger from GitHub Actions tab

jobs:
  sync-pdfs:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout note repo ──────────────────────────────
      - name: Checkout note repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need parent commit for diff

      # ── 2. Get changed PDFs in latest commit ───────────────
      - name: Identify changed PDFs
        id: changed
        run: |
          # For manual triggers, check ALL PDFs instead of just the latest diff
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — scanning all PDFs"
            CHANGED_PDFS=$(find . -name '*.pdf' -not -path './.git/*')
          else
            CHANGED_PDFS=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- '*.pdf' || true)
          fi

          echo "=== PDFs to check ==="
          echo "$CHANGED_PDFS"
          echo "pdfs<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_PDFS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ -z "$CHANGED_PDFS" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No PDFs changed — will skip sync"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── 3. Clone web repo ─────────────────────────────────
      - name: Clone web repo
        if: steps.changed.outputs.skip == 'false'
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ secrets.WEB_REPO_PAT }}@github.com/dizzyryan/ryansloom.com.git \
            /tmp/web-repo

      # ── 4. Update only matching PDFs ───────────────────────
      # Only updates PDFs that already exist in web repo files/.
      # To add a new PDF to the pipeline, manually add it to files/ first.
      - name: Sync matching PDFs
        if: steps.changed.outputs.skip == 'false'
        run: |
          UPDATED=0

          while IFS= read -r pdf_path; do
            [ -z "$pdf_path" ] && continue
            filename=$(basename "$pdf_path")
            target="/tmp/web-repo/files/$filename"

            if [ -f "$target" ]; then
              cp "$pdf_path" "$target"
              echo "✅ Updated: $filename"
              UPDATED=$((UPDATED + 1))
            else
              echo "⏭️  Skipped (not in web repo): $filename"
            fi
          done <<< "${{ steps.changed.outputs.pdfs }}"

          echo "=== $UPDATED PDF(s) updated ==="

      # ── 5. Commit and push (only if changes exist) ─────────
      - name: Commit and push
        if: steps.changed.outputs.skip == 'false'
        run: |
          cd /tmp/web-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/
          if git diff --cached --quiet; then
            echo "✅ No changes to commit — skipping push"
          else
            CHANGED=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git commit -m "sync: update $CHANGED PDF(s) from CUHK-CS-Notes

Automated by GitHub Actions workflow.
Triggered by: ${{ github.sha }}"
            git push
            echo "✅ Pushed $CHANGED file change(s) — Vercel will auto-deploy"
          fi
